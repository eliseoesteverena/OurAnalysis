<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Groq STT · Banco de pruebas</title>
<style>
  :root{
    --bg: #14120F;
    --panel: #1D1A16;
    --panel-2: #262219;
    --hairline: #35302A;
    --text: #F2EEE6;
    --muted: #8C8578;
    --amber: #E8A33D;
    --amber-dim: #7A5A26;
    --good: #6FCF97;
    --warn: #E5A94A;
    --bad: #E5484D;
    --mono: "SF Mono", "Roboto Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, sans-serif;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body{ height: 100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
    -webkit-font-smoothing: antialiased;
  }
  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 20px 18px 40px;
  }
  header{
    display:flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 6px 0 18px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 20px;
  }
  header h1{
    font-size: 15px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    margin: 0;
  }
  header h1 span{ color: var(--amber); }
  header .badge{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    border: 1px solid var(--hairline);
    padding: 3px 8px;
    border-radius: 20px;
  }

  /* ---- panel base ---- */
  .panel{
    background: var(--panel);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .panel-title{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
  }

  /* ---- recorder ---- */
  .recorder{
    display:flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 28px 16px 22px;
  }
  .meter{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap: 4px;
    height: 56px;
    width: 100%;
    max-width: 280px;
  }
  .meter .bar{
    width: 6px;
    border-radius: 3px 3px 0 0;
    background: var(--hairline);
    height: 4px;
    transition: height 70ms linear, background 120ms linear;
  }
  .record-btn{
    position: relative;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: none;
    background: var(--amber);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor: pointer;
    touch-action: manipulation;
  }
  .record-btn:active{ transform: scale(0.96); }
  .record-btn .dot{
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--bg);
    transition: all 160ms ease;
  }
  .record-btn.recording{ background: var(--bad); }
  .record-btn.recording .dot{
    border-radius: 4px;
    width: 24px;
    height: 24px;
  }
  .record-btn.recording{
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 0 0 rgba(229,72,77,0.35); }
    50%{ box-shadow: 0 0 0 14px rgba(229,72,77,0); }
  }
  .record-hint{
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align:center;
    min-height: 16px;
  }
  .timer{
    font-family: var(--mono);
    font-size: 28px;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
  }
  .timer.idle{ color: var(--muted); }
  .timer.active{ color: var(--bad); }

  /* ---- settings ---- */
  details.panel{ padding: 0; }
  details.panel summary{
    list-style:none;
    cursor:pointer;
    padding: 14px 16px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  details.panel summary::-webkit-details-marker{ display:none; }
  details.panel summary::after{ content: "+"; font-size: 16px; color: var(--amber); }
  details.panel[open] summary::after{ content: "–"; }
  details.panel[open] summary{ border-bottom: 1px solid var(--hairline); }
  .settings-body{ padding: 14px 16px 16px; display:flex; flex-direction:column; gap:12px; }
  .field label{
    display:block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  select, input[type=text]{
    width:100%;
    background: var(--panel-2);
    border: 1px solid var(--hairline);
    color: var(--text);
    padding: 10px 10px;
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--sans);
  }
  select:focus, input:focus{ outline: 2px solid var(--amber); outline-offset: 1px; }
  .row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* ---- status / errors ---- */
  .status{
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 14px;
    border: 1px solid var(--hairline);
    display:none;
  }
  .status.show{ display:block; }
  .status.error{ background: rgba(229,72,77,0.1); border-color: var(--bad); color: #FFB4B6; }
  .status.info{ background: rgba(232,163,61,0.08); border-color: var(--amber-dim); color: var(--amber); }

  /* ---- result ---- */
  .result-header{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .result-meta{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .transcript{
    font-size: 16px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .transcript .seg{
    border-bottom: 2px solid transparent;
    padding-bottom: 1px;
  }
  .transcript .seg.good{ border-color: rgba(111,207,151,0.45); }
  .transcript .seg.warn{ border-color: rgba(229,169,74,0.55); }
  .transcript .seg.bad{ border-color: rgba(229,72,77,0.6); }
  .legend{
    display:flex; gap: 14px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 10.5px; color: var(--muted);
    margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--hairline);
  }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend i{ width:9px; height:9px; border-radius:2px; display:inline-block; }
  .legend .lg-good{ background: var(--good); }
  .legend .lg-warn{ background: var(--warn); }
  .legend .lg-bad{ background: var(--bad); }

  table.segtable{
    width:100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 11.5px;
    margin-top: 10px;
  }
  table.segtable th, table.segtable td{
    text-align: left;
    padding: 7px 6px;
    border-bottom: 1px solid var(--hairline);
    color: var(--muted);
  }
  table.segtable td.txt{ color: var(--text); }
  table.segtable td.num{ font-variant-numeric: tabular-nums; white-space:nowrap; }
  .dot-flag{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }

  .empty{
    color: var(--muted);
    font-size: 13.5px;
    text-align:center;
    padding: 18px 8px;
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 10.5px;
    margin-top: 24px;
    line-height: 1.6;
  }

  @media (prefers-reduced-motion: reduce){
    .record-btn.recording{ animation:none; }
    .meter .bar{ transition:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Groq<span>·</span>STT</h1>
    <span class="badge" id="modelBadge">whisper-large-v3-turbo</span>
  </header>

  <div id="statusBox" class="status"></div>

  <div class="panel recorder">
    <div class="meter" id="meter"></div>
    <button class="record-btn" id="recordBtn" aria-label="Grabar">
      <span class="dot"></span>
    </button>
    <div class="timer idle" id="timer">00:00</div>
    <div class="record-hint" id="hint">Tocá para grabar. Se pide permiso de micrófono la primera vez.</div>
  </div>

  <details class="panel">
    <summary>Parámetros de transcripción</summary>
    <div class="settings-body">
      <div class="row2">
        <div class="field">
          <label for="modelSel">Modelo</label>
          <select id="modelSel">
            <option value="whisper-large-v3-turbo" selected>large-v3-turbo (rápido)</option>
            <option value="whisper-large-v3">large-v3 (más preciso)</option>
          </select>
        </div>
        <div class="field">
          <label for="langInput">Idioma (ISO-639-1)</label>
          <input type="text" id="langInput" placeholder="es (opcional)" maxlength="5" />
        </div>
      </div>
      <div class="field">
        <label for="promptInput">Prompt de contexto (opcional)</label>
        <input type="text" id="promptInput" placeholder="Ej: nombres propios, jerga técnica..." />
      </div>
    </div>
  </details>

  <div class="panel" id="resultPanel">
    <div class="result-header">
      <p class="panel-title" style="margin:0;">Transcripción</p>
      <span class="result-meta" id="resultMeta"></span>
    </div>
    <div id="resultBody">
      <p class="empty">Todavía no hay transcripciones. Grabá algo arriba.</p>
    </div>
  </div>

  <footer>
    Audio procesado vía función serverless propia · la API key de Groq<br/>
    nunca se expone en el navegador.
  </footer>
</div>

<script>
(function(){
  const recordBtn = document.getElementById('recordBtn');
  const timerEl = document.getElementById('timer');
  const hintEl = document.getElementById('hint');
  const meterEl = document.getElementById('meter');
  const statusBox = document.getElementById('statusBox');
  const resultBody = document.getElementById('resultBody');
  const resultMeta = document.getElementById('resultMeta');
  const modelSel = document.getElementById('modelSel');
  const modelBadge = document.getElementById('modelBadge');
  const langInput = document.getElementById('langInput');
  const promptInput = document.getElementById('promptInput');

  const MAX_SECONDS = 120; // tope para no mandar audios enormes desde mobile data
  const BAR_COUNT = 24;

  // construir barras del medidor de nivel
  for(let i=0;i<BAR_COUNT;i++){
    const b = document.createElement('div');
    b.className = 'bar';
    meterEl.appendChild(b);
  }
  const bars = Array.from(meterEl.querySelectorAll('.bar'));

  modelSel.addEventListener('change', () => {
    modelBadge.textContent = modelSel.value;
  });

  let mediaStream = null;
  let mediaRecorder = null;
  let chunks = [];
  let audioCtx = null;
  let analyser = null;
  let rafId = null;
  let timerInterval = null;
  let startTime = 0;
  let recording = false;

  function setStatus(msg, type){
    if(!msg){ statusBox.className = 'status'; statusBox.textContent=''; return; }
    statusBox.className = 'status show ' + (type || 'info');
    statusBox.textContent = msg;
  }

  function fmtTime(sec){
    const m = Math.floor(sec/60).toString().padStart(2,'0');
    const s = Math.floor(sec%60).toString().padStart(2,'0');
    return m+':'+s;
  }

  function pickMimeType(){
    const candidates = [
      'audio/webm;codecs=opus',
      'audio/webm',
      'audio/mp4',        // Safari / iOS
      'audio/ogg;codecs=opus'
    ];
    for(const c of candidates){
      if(window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)){
        return c;
      }
    }
    return ''; // dejar que el navegador elija
  }

  function extForMime(mime){
    if(mime.includes('mp4')) return 'm4a';
    if(mime.includes('ogg')) return 'ogg';
    return 'webm';
  }

  async function startRecording(){
    setStatus('');
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      setStatus('Este navegador no soporta acceso al micrófono.', 'error');
      return;
    }
    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          channelCount: 1,
          sampleRate: 16000
        }
      });
    }catch(err){
      if(err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError'){
        setStatus('Permiso de micrófono denegado. Habilitalo desde los ajustes del navegador/sitio.', 'error');
      }else if(err.name === 'NotFoundError'){
        setStatus('No se encontró ningún micrófono en este dispositivo.', 'error');
      }else{
        setStatus('No se pudo acceder al micrófono: ' + err.message, 'error');
      }
      return;
    }

    // medidor de nivel liviano (fftSize chico para no consumir CPU en mobile)
    try{
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioCtx.createMediaStreamSource(mediaStream);
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 64;
      analyser.smoothingTimeConstant = 0.6;
      source.connect(analyser);
      tickMeter();
    }catch(e){ /* si falla el meter, seguimos igual sin visualización */ }

    const mime = pickMimeType();
    chunks = [];
    try{
      mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime }) : new MediaRecorder(mediaStream);
    }catch(e){
      setStatus('No se pudo iniciar el grabador de audio: ' + e.message, 'error');
      cleanupStream();
      return;
    }

    mediaRecorder.ondataavailable = (e) => { if(e.data && e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start();

    recording = true;
    recordBtn.classList.add('recording');
    hintEl.textContent = 'Grabando… tocá de nuevo para detener.';
    timerEl.classList.remove('idle');
    timerEl.classList.add('active');
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const elapsed = (Date.now() - startTime) / 1000;
      timerEl.textContent = fmtTime(elapsed);
      if(elapsed >= MAX_SECONDS) stopRecording();
    }, 200);
  }

  function tickMeter(){
    if(!analyser) return;
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const step = Math.floor(data.length / BAR_COUNT) || 1;
    for(let i=0;i<BAR_COUNT;i++){
      const v = data[i*step] || 0;
      const h = Math.max(4, Math.round((v/255)*56));
      bars[i].style.height = h + 'px';
      bars[i].style.background = h > 40 ? 'var(--bad)' : (h > 20 ? 'var(--amber)' : 'var(--hairline)');
    }
    rafId = requestAnimationFrame(tickMeter);
  }

  function resetMeter(){
    bars.forEach(b => { b.style.height = '4px'; b.style.background = 'var(--hairline)'; });
  }

  function cleanupStream(){
    if(mediaStream){ mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    if(audioCtx){ audioCtx.close().catch(()=>{}); audioCtx = null; }
    analyser = null;
    resetMeter();
  }

  function stopRecording(){
    if(!recording || !mediaRecorder) return;
    recording = false;
    clearInterval(timerInterval);
    timerInterval = null;
    recordBtn.classList.remove('recording');
    timerEl.classList.remove('active');
    timerEl.classList.add('idle');
    hintEl.textContent = 'Procesando…';
    if(mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  }

  async function onRecordingStop(){
    cleanupStream();
    const mime = (mediaRecorder && mediaRecorder.mimeType) || 'audio/webm';
    const blob = new Blob(chunks, { type: mime });
    chunks = [];
    timerEl.textContent = '00:00';

    if(blob.size < 800){
      setStatus('La grabación fue demasiado corta. Probá de nuevo.', 'error');
      hintEl.textContent = 'Tocá para grabar.';
      return;
    }

    await sendToTranscribe(blob, mime);
  }

  async function sendToTranscribe(blob, mime){
    setStatus('Transcribiendo con Groq (' + modelSel.value + ')…', 'info');
    hintEl.textContent = 'Transcribiendo…';
    recordBtn.disabled = true;

    // idioma: el que haya puesto el usuario, o si no, el del navegador
    const browserLang = (navigator.language || 'es').split('-')[0];
    const language = langInput.value.trim() || browserLang;

    // prompt: el que haya puesto el usuario, o si no, uno pensado para
    // notas de voz espontáneas de una sola persona contando su día
    const suggestedPrompt = 'Transcripción informal de una nota de voz personal, alguien contando cómo estuvo su día, como se siente y demás echos que considera oportuno decir. Conservar muletillas y coloquialismos.';
    const prompt = promptInput.value.trim() || suggestedPrompt;

    const form = new FormData();
    form.append('file', blob, 'audio.' + extForMime(mime));
    form.append('model', modelSel.value);
    form.append('response_format', 'verbose_json');
    form.append('language', language);
    form.append('prompt', prompt);

    const t0 = performance.now();
    try{
      const res = await fetch('/api/transcribe', { method: 'POST', body: form });
      const elapsedMs = Math.round(performance.now() - t0);
      const data = await res.json().catch(() => null);

      if(!res.ok){
        const msg = (data && (data.error?.message || data.error)) || ('Error HTTP ' + res.status);
        setStatus('Falló la transcripción: ' + msg, 'error');
        hintEl.textContent = 'Tocá para grabar.';
        recordBtn.disabled = false;
        return;
      }

      renderResult(data, blob.size, elapsedMs);
      setStatus('');
    }catch(err){
      setStatus('Error de red al llamar a /api/transcribe: ' + err.message, 'error');
    }finally{
      hintEl.textContent = 'Tocá para grabar.';
      recordBtn.disabled = false;
    }
  }

  function confidenceClass(seg){
    // heurística basada en avg_logprob y no_speech_prob según la doc de Groq
    if(seg.no_speech_prob > 0.6 || seg.avg_logprob < -0.7) return 'bad';
    if(seg.no_speech_prob > 0.3 || seg.avg_logprob < -0.35) return 'warn';
    return 'good';
  }

  function renderResult(data, bytes, elapsedMs){
    const kb = (bytes/1024).toFixed(0);
    resultMeta.textContent = kb + ' KB · ' + elapsedMs + ' ms';

    const segments = Array.isArray(data.segments) ? data.segments : null;

    let html = '';
    if(segments && segments.length){
      html += '<div class="transcript">';
      segments.forEach(seg => {
        const cls = confidenceClass(seg);
        html += `<span class="seg ${cls}">${escapeHtml(seg.text.trim())}</span> `;
      });
      html += '</div>';

      html += `<div class="legend">
        <span><i class="lg-good"></i>confianza alta</span>
        <span><i class="lg-warn"></i>revisar</span>
        <span><i class="lg-bad"></i>baja confianza / posible silencio</span>
      </div>`;

      html += '<table class="segtable"><thead><tr>' +
        '<th></th><th>t</th><th>logprob</th><th>no_speech</th><th>compr.</th></tr></thead><tbody>';
      segments.forEach(seg => {
        const cls = confidenceClass(seg);
        const color = cls === 'bad' ? 'var(--bad)' : (cls === 'warn' ? 'var(--warn)' : 'var(--good)');
        html += `<tr>
          <td><span class="dot-flag" style="background:${color}"></span></td>
          <td class="num">${seg.start.toFixed(1)}–${seg.end.toFixed(1)}s</td>
          <td class="num">${seg.avg_logprob.toFixed(3)}</td>
          <td class="num">${seg.no_speech_prob.toFixed(3)}</td>
          <td class="num">${seg.compression_ratio.toFixed(2)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
    } else if(data.text){
      html += `<div class="transcript">${escapeHtml(data.text)}</div>`;
    } else {
      html += '<p class="empty">La respuesta no incluyó texto.</p>';
    }

    resultBody.innerHTML = html;
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  recordBtn.addEventListener('click', () => {
    if(recording) stopRecording();
    else startRecording();
  });

  // liberar el micrófono si el usuario cambia de pestaña/app mientras graba
  document.addEventListener('visibilitychange', () => {
    if(document.hidden && recording) stopRecording();
  });
})();
</script>
</body>
</html>
